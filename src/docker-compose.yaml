services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autoparts-sql
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SuaSenha@123"
      MSSQL_PID: "Developer"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SuaSenha@123' -No -Q 'SELECT 1' || exit 1"
      ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sql_data: